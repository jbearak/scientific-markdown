---
name: CI

"on":
  pull_request:
  workflow_dispatch:

# Avoid wasting CI minutes by canceling older runs of the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      binaries: ${{ steps.filter.outputs.binaries }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            source:
              - 'package.json'
              - 'bun.lock'
              - 'esbuild.mjs'
              - 'tsconfig*.json'
              - 'src/**'
              - 'scripts/**'
              - 'test/**'

            binaries:
              - 'src/**'
              - 'package.json'
              - 'bun.lock'
              - 'esbuild.mjs'
              - 'scripts/build-binary.ts'

  verify:
    name: Verify (typecheck + tests)
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun test

  vscode-extension:
    name: VS Code extension
    needs: [changes, verify]
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build extension
        run: bun run package
      - name: Validate VSIX contents
        run: |
          shopt -s nullglob
          vsix_files=( *.vsix )
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "ERROR: No .vsix package produced"
            exit 1
          fi
          vsix="${vsix_files[0]}"
          ls -la "$vsix"

          # Verify required bundled files are present and non-trivial
          for f in extension/out/extension.js extension/out/server.js; do
            size=$(unzip -l "$vsix" "$f" 2>/dev/null | awk -v target="$f" '$NF == target { print $1; exit }')
            if [ -z "$size" ] || [ "$size" -lt 1000 ]; then
              echo "ERROR: $f missing or too small (${size:-0} bytes)"
              exit 1
            fi
            echo "OK: $f ($size bytes)"
          done

          # Verify node_modules did NOT leak into the VSIX
          if unzip -l "$vsix" | grep -q 'extension/node_modules/'; then
            echo "ERROR: node_modules leaked into VSIX"
            unzip -l "$vsix" | grep 'extension/node_modules/' | head -5
            exit 1
          fi
          echo "OK: no node_modules in VSIX"

          # Verify manifest
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.engines?.vscode) throw new Error('Missing VS Code engine');
            if (pkg.bundledDependencies) throw new Error('bundledDependencies should not exist (deps are esbuild-inlined)');
            console.log('Extension:', pkg.displayName);
            console.log('Version:', pkg.version);
            console.log('Publisher:', pkg.publisher);
          "

  binaries:
    name: Binary artifacts
    needs: [changes, verify]
    if: needs.changes.outputs.binaries == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build current platform binary
        run: bun run build:current
      - name: Test binary execution
        shell: bash
        run: |
          ARCH="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          if [ -z "${ARCH}" ]; then
            echo "ERROR: RUNNER_ARCH is not set"
            exit 1
          fi
          case "${ARCH}" in
            x64|arm64) ;;
            *)
              echo "ERROR: Unsupported RUNNER_ARCH value: ${RUNNER_ARCH}"
              exit 1
              ;;
          esac
          case "${{ runner.os }}" in
            Windows) PLATFORM="windows"; EXT=".exe";;
            macOS)   PLATFORM="darwin"; EXT="";;
            Linux)   PLATFORM="linux"; EXT="";;
            *)
              echo "ERROR: Unsupported runner OS: ${{ runner.os }}"
              exit 1
              ;;
          esac
          BINARY="bin/manuscript-markdown-${PLATFORM}-${ARCH}${EXT}"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Expected binary not found: $BINARY"
            ls -la bin || true
            exit 1
          fi

          chmod +x "$BINARY" 2>/dev/null || true
          "$BINARY" --version
          "$BINARY" --help
